<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      width: min(520px, 90vw);
    }
    h1 {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 32px;
    }
    .balance {
      font-size: clamp(24px, 8vw, 52px);
      font-weight: bold;
      color: #f97316;
      margin-bottom: 8px;
      transition: transform 0.1s;
      word-break: break-all;
    }
    .balance.pop {
      transform: scale(1.12);
    }
    .currency {
      font-size: 13px;
      color: #444;
      margin-bottom: 40px;
      letter-spacing: 0.1em;
    }
    button {
      background: #f97316;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 16px 32px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover { background: #fb923c; }
    button:active { transform: scale(0.97); }
    .log {
      margin-top: 28px;
      font-size: 12px;
      color: #444;
      height: 80px;
      overflow: hidden;
      text-align: left;
    }
    .log-entry {
      padding: 3px 0;
      border-bottom: 1px solid #1a1a1a;
      animation: fadeIn 0.3s ease;
    }
    .log-entry .amount { color: #4ade80; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .confetti-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 2px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="confetti-wrap" id="confetti"></div>
  <div class="card">
    <h1>My Bank</h1>
    <div class="balance" id="balance">$0.00</div>
    <div class="currency">USD · TOTALLY REAL</div>
    <button onclick="addMoney()">💰 Put Money In Bank</button>
    <div class="log" id="log"></div>
  </div>

  <script>
    let balance = 0;

    const amounts = [100, 250, 500, 1000, 2500, 10000, 50000];
    const msgs = [
      "direct deposit received",
      "lottery winnings cleared",
      "mysterious benefactor",
      "Nigerian prince transfer",
      "found in couch cushions",
      "stock options vested",
      "crypto mooned",
    ];

    function fmt(n) {
      return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function addMoney() {
      const amount = amounts[Math.floor(Math.random() * amounts.length)];
      const msg = msgs[Math.floor(Math.random() * msgs.length)];
      balance += amount;

      const el = document.getElementById('balance');
      el.textContent = fmt(balance);
      el.classList.remove('pop');
      void el.offsetWidth;
      el.classList.add('pop');
      setTimeout(() => el.classList.remove('pop'), 150);

      const log = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="amount">+${fmt(amount)}</span> — ${msg}`;
      log.prepend(entry);
      while (log.children.length > 4) log.removeChild(log.lastChild);

      if (amount >= 10000) burst();
    }

    function burst() {
      const wrap = document.getElementById('confetti');
      const colors = ['#f97316', '#facc15', '#4ade80', '#60a5fa', '#e879f9'];
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
        p.style.animationDelay = (Math.random() * 0.4) + 's';
        wrap.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }
  </script>
</body>
</html>
