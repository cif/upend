<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sarah</title>
  <script>(function(){function a(d){document.documentElement.classList.toggle('light',!d)}var p=new URLSearchParams(location.search),t=p.get('upend_theme'),d=t?t!=='light':matchMedia('(prefers-color-scheme: dark)').matches;a(d);window.addEventListener('message',function(e){if(e.data&&e.data.type==='upend_theme')a(e.data.darkMode)})})();</script>
  <style>
    html.light body { background: #f5f5f5; color: #1f2937; }
    html.light th { color: #9ca3af; border-bottom-color: #e5e7eb; }
    html.light td { border-bottom-color: #f3f4f6; }
    html.light .pending { color: #9ca3af; }
    html.light .empty { color: #9ca3af; }
  </style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .heart { font-size: 5em; margin-bottom: 32px; }
    table { border-collapse: collapse; width: 100%; max-width: 560px; font-size: 0.9em; }
    th { text-align: left; color: #555; font-weight: normal; padding: 6px 12px; border-bottom: 1px solid #222; }
    td { padding: 8px 12px; border-bottom: 1px solid #1a1a1a; }
    .shipped { color: #4ade80; }
    .pending { color: #555; }
    .empty { color: #444; text-align: center; padding: 24px; }
  </style>
</head>
<body>
  <div class="heart">🚒 hey!</div>
  <table>
    <thead>
      <tr>
        <th>name</th>
        <th>sku</th>
        <th>status</th>
      </tr>
    </thead>
    <tbody id="list">
      <tr><td colspan="3" class="empty">loading...</td></tr>
    </tbody>
  </table>

  <script>
    const token = localStorage.getItem('upend_token');

    async function load() {
      const tbody = document.getElementById('list');
      if (!token) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">no token — log in via the dashboard first</td></tr>';
        return;
      }
      try {
        const res = await fetch('/api/data/things?order=created_at.desc', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const things = await res.json();
        if (!things.length) {
          tbody.innerHTML = '<tr><td colspan="3" class="empty">no things yet</td></tr>';
          return;
        }
        tbody.innerHTML = things.map(t => `
          <tr>
            <td>${esc(t.name)}</td>
            <td style="color:#666">${esc(t.sku || '—')}</td>
            <td class="${t.shipped ? 'shipped' : 'pending'}">${t.shipped ? 'shipped' : 'pending'}</td>
          </tr>
        `).join('');
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="3" class="empty">${esc(e.message)}</td></tr>`;
      }
    }

    function esc(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    load();
  </script>
</body>
</html>
