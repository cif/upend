<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>upend</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #262626;
      --text: #e5e5e5;
      --muted: #737373;
      --accent: #f97316;
      --accent-dim: #431407;
      --green: #22c55e;
      --red: #ef4444;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 40px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      flex-shrink: 0;
      z-index: 100;
    }

    .topbar .left { display: flex; align-items: center; gap: 12px; }

    .topbar .logo {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .topbar .nav { display: flex; gap: 2px; }

    .topbar .nav-btn {
      padding: 5px 12px;
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      position: relative;
    }

    .topbar .nav-btn:hover { color: var(--text); background: var(--border); }
    .topbar .nav-btn.active { color: var(--accent); background: var(--accent-dim); }

    .topbar .right { display: flex; align-items: center; gap: 10px; }
    .topbar .user-info { font-size: 11px; color: var(--muted); }

    .topbar .btn {
      padding: 4px 10px;
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }
    .topbar .btn:hover { color: var(--text); border-color: var(--muted); }

    .session-label {
      font-size: 11px;
      color: var(--muted);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topbar .status {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    .topbar .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }

    .topbar .dot.active { background: var(--green); }
    .topbar .dot.running { background: var(--accent); animation: pulse 1s infinite; }
    .topbar .dot.error { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* apps dropdown */
    .dropdown { position: relative; }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      min-width: 180px;
      padding: 4px;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .dropdown-menu.open { display: block; }

    .dropdown-menu .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text);
    }

    .dropdown-menu .item:hover { background: var(--border); }
    .dropdown-menu .item.active { color: var(--accent); background: var(--accent-dim); }

    .dropdown-menu .item .popout {
      color: var(--muted);
      text-decoration: none;
      font-size: 10px;
      padding: 2px 6px;
    }
    .dropdown-menu .item .popout:hover { color: var(--text); }

    .dropdown-menu .empty {
      padding: 12px;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
    }

    /* panels */
    .panels {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .panel {
      flex: 1;
      min-height: 0;
    }

    .panel iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .resizer {
      width: 4px;
      cursor: col-resize;
      background: var(--border);
      flex-shrink: 0;
    }
    .resizer:hover { background: var(--accent); }

    #right-iframe { display: block; }

    /* sessions drawer */
    .sessions-drawer {
      position: fixed;
      left: 0;
      top: 40px;
      bottom: 0;
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.2s;
      display: flex;
      flex-direction: column;
    }

    .sessions-drawer.open { transform: translateX(0); }

    .sessions-drawer .session-item {
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .sessions-drawer .session-item:hover { background: var(--border); color: var(--text); }
    .sessions-drawer .session-item.active { background: var(--accent-dim); color: var(--accent); }

    /* login */
    .login-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .login-overlay.hidden { display: none; }

    .login-overlay form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px; width: 340px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .login-overlay h2 { font-size: 16px; color: var(--accent); margin-bottom: 4px; }
    .login-overlay input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 13px; outline: none;
    }
    .login-overlay input:focus { border-color: var(--accent); }
    .login-overlay button[type="submit"] {
      padding: 10px; background: var(--accent); color: #000; border: none;
      border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .login-overlay .toggle { font-size: 12px; color: var(--muted); text-align: center; cursor: pointer; }
    .login-overlay .toggle:hover { color: var(--text); }
    .login-overlay .error { color: var(--red); font-size: 12px; }
  </style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <form id="auth-form">
    <h2 id="auth-title">log in</h2>
    <input name="email" type="email" placeholder="email" autocomplete="email" required>
    <input name="password" type="password" placeholder="password" autocomplete="current-password" required>
    <div class="error" id="auth-error"></div>
    <button type="submit" id="auth-submit">log in</button>
    <div class="toggle" id="auth-toggle">need an account? sign up</div>
  </form>
</div>

<div class="topbar" id="topbar" style="display:none">
  <div class="left">
    <button class="nav-btn" id="btn-hamburger" title="sessions" style="font-size:18px;padding:4px 10px">☰</button>
    <div class="logo">upend</div>
    <div class="nav">
      <button class="nav-btn active" id="btn-data">data</button>
      <div class="dropdown">
        <button class="nav-btn" id="btn-apps">apps ▾</button>
        <div class="dropdown-menu" id="apps-menu"></div>
      </div>
    </div>
  </div>
  <div class="right">
    <span class="session-label" id="session-label">no session</span>
    <div class="status" id="topbar-status">
      <span class="dot" id="topbar-dot"></span>
      <span id="topbar-status-text"></span>
    </div>
    <button class="btn" id="btn-commit" style="display:none;color:var(--green);border-color:var(--green)">commit</button>
    <span class="user-info" id="user-info"></span>
    <button class="btn" id="logout-btn">logout</button>
  </div>
</div>

<div class="sessions-drawer" id="sessions-drawer">
  <div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted)">sessions</span>
    <button id="btn-new-session" style="background:var(--accent);color:#fff;border:none;padding:5px 12px;border-radius:4px;font-family:inherit;font-size:11px;cursor:pointer">+ new</button>
  </div>
  <div id="sessions-list" style="padding:0 8px;flex:1;overflow-y:auto"></div>
</div>

<div class="panels" id="panels" style="display:none">
  <div class="panel" id="panel-left">
    <iframe id="iframe-claude"></iframe>
  </div>
  <div class="resizer" id="resizer"></div>
  <div class="panel" id="panel-right">
    <iframe id="right-iframe"></iframe>
  </div>
</div>

<script>
const API = '/api';
const CLAUDE_URL = '/claude/ui/';
const STUDIO_URL = 'https://local.drizzle.studio';

let token = localStorage.getItem('upend_token');
let userEmail = localStorage.getItem('upend_email');
let isSignup = false;
let currentView = 'data'; // 'data' or app name

// ---------- auth ----------

function checkAuth() {
  if (token) {
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('topbar').style.display = '';
    document.getElementById('panels').style.display = '';
    document.getElementById('user-info').textContent = userEmail || '';
    loadIframes();
    loadApps();
  }
}

document.getElementById('auth-toggle').onclick = () => {
  isSignup = !isSignup;
  document.getElementById('auth-title').textContent = isSignup ? 'sign up' : 'log in';
  document.getElementById('auth-submit').textContent = isSignup ? 'sign up' : 'log in';
  document.getElementById('auth-toggle').textContent = isSignup
    ? 'already have an account? log in' : 'need an account? sign up';
};

document.getElementById('auth-form').onsubmit = async (e) => {
  e.preventDefault();
  const form = new FormData(e.target);
  try {
    const res = await fetch(API + (isSignup ? '/auth/signup' : '/auth/login'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: form.get('email'), password: form.get('password') }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    token = data.token;
    userEmail = data.user.email;
    localStorage.setItem('upend_token', token);
    localStorage.setItem('upend_email', userEmail);
    checkAuth();
  } catch (err) {
    document.getElementById('auth-error').textContent = err.message;
  }
};

document.getElementById('logout-btn').onclick = () => {
  token = null; userEmail = null;
  localStorage.removeItem('upend_token');
  localStorage.removeItem('upend_email');
  document.getElementById('login-overlay').classList.remove('hidden');
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('panels').style.display = 'none';
};

// ---------- iframes ----------

let iframesLoaded = false;

function loadIframes() {
  if (iframesLoaded) return;
  iframesLoaded = true;
  document.getElementById('iframe-claude').src = CLAUDE_URL + '?token=' + encodeURIComponent(token);
  showData();

  // restore saved session after iframe is ready
  if (store.currentSessionId) {
    const id = store.currentSessionId;
    const frame = document.getElementById('iframe-claude');
    const tryRestore = setInterval(() => {
      try {
        if (frame.contentWindow?.openSession) {
          clearInterval(tryRestore);
          store.openSession(id);
        }
      } catch {}
    }, 200);
    // give up after 10s
    setTimeout(() => clearInterval(tryRestore), 10000);
  }
}

// ---------- right panel switching ----------

function showData() {
  currentView = 'data';
  document.getElementById('right-iframe').src = STUDIO_URL;
  document.getElementById('btn-data').classList.add('active');
  document.getElementById('btn-apps').classList.remove('active');
}

function openApp(name) {
  currentView = name;
  document.getElementById('right-iframe').src = `/apps/${name}/`;
  document.getElementById('btn-data').classList.remove('active');
  document.getElementById('btn-apps').classList.add('active');
  document.getElementById('apps-menu').classList.remove('open');
}

// ---------- nav clicks ----------

document.getElementById('btn-data').onclick = () => showData();

document.getElementById('btn-apps').onclick = (e) => {
  e.stopPropagation();
  document.getElementById('apps-menu').classList.toggle('open');
  loadApps();
};

document.addEventListener('click', (e) => {
  if (!e.target.closest('.dropdown')) {
    document.getElementById('apps-menu').classList.remove('open');
  }
});

// ---------- apps list ----------

async function loadApps() {
  try {
    const res = await fetch('/claude/apps', {
      headers: { 'Authorization': `Bearer ${token}` },
    });
    const apps = await res.json();
    const menu = document.getElementById('apps-menu');

    let html = '';

    if (apps.length) {
      html += apps.map(app =>
        `<div class="item ${currentView === app.name ? 'active' : ''}" onclick="openApp('${app.name}')">
          <span>${app.name}</span>
          <a class="popout" href="/apps/${app.name}/" target="_blank" onclick="event.stopPropagation()" title="open in new tab">&#8599;</a>
        </div>`
      ).join('');
    } else {
      html += '<div class="empty">no apps yet</div>';
    }

    html += '<div style="border-top:1px solid var(--border);margin-top:4px;padding-top:4px">'
      + '<div class="item" onclick="createNewApp()" style="color:var(--accent)">+ new app</div>'
      + '</div>';

    menu.innerHTML = html;
  } catch {
    document.getElementById('apps-menu').innerHTML = '<div class="empty">failed to load</div>';
  }
}

function createNewApp() {
  document.getElementById('apps-menu').classList.remove('open');
  const name = prompt('app name (lowercase, no spaces):');
  if (!name) return;
  const desc = prompt('what should this app do?');
  if (!desc) return;

  // send to claude via the chat iframe
  const claudeIframe = document.getElementById('iframe-claude');
  claudeIframe.contentWindow?.postMessage({
    type: 'upend:send-prompt',
    prompt: `create an app called "${name}" in apps/${name}/. ${desc}`,
  }, '*');
}

// ---------- session controls ----------

const claudeFrame = () => document.getElementById('iframe-claude');

// simple store — dashboard owns session state
window.store = {
  sessions: [],
  currentSessionId: localStorage.getItem('upend_dashboard_session') ? Number(localStorage.getItem('upend_dashboard_session')) : null,
  status: 'ready',

  async loadSessions() {
    try {
      const res = await fetch('/claude/sessions', {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (!res.ok) return;
      this.sessions = await res.json();
      this.renderDrawer();
    } catch (err) {
      console.error('[store] loadSessions:', err);
    }
  },

  renderDrawer() {
    const list = document.getElementById('sessions-list');
    if (!list) return;
    const active = this.sessions.filter(s => s.status === 'active');
    list.innerHTML = active.map(s => `
      <div class="session-item ${s.id == this.currentSessionId ? 'active' : ''}"
           onclick="store.openSession(${s.id})">
        ${s.prompt.slice(0, 50)}
      </div>
    `).join('') || '<div style="padding:12px;color:var(--muted);font-size:11px">no active sessions</div>';
  },

  openSession(id) {
    this.currentSessionId = id;
    localStorage.setItem('upend_dashboard_session', id);
    const s = this.sessions.find(s => s.id == id);
    document.getElementById('session-label').textContent = s?.prompt?.slice(0, 40) || `#${id}`;
    document.getElementById('btn-commit').style.display = '';
    document.getElementById('sessions-drawer').classList.remove('open');
    // call the iframe's function directly (same origin through Caddy)
    try {
      claudeFrame()?.contentWindow?.openSession(id);
    } catch (err) {
      console.error('[store] openSession failed:', err);
    }
    this.renderDrawer();
  },

  newSession() {
    this.currentSessionId = null;
    localStorage.removeItem('upend_dashboard_session');
    document.getElementById('session-label').textContent = 'new session';
    document.getElementById('btn-commit').style.display = 'none';
    document.getElementById('sessions-drawer').classList.remove('open');
    try {
      const w = claudeFrame()?.contentWindow;
      if (w?.currentSessionId !== undefined) {
        w.currentSessionId = null;
        w.localStorage.removeItem('upend_session');
        w.document.getElementById('messages').innerHTML = '';
        w.document.getElementById('chat-input')?.focus();
      }
    } catch (err) {
      console.error('[store] newSession failed:', err);
    }
  },
};

document.getElementById('btn-hamburger').onclick = () => {
  const drawer = document.getElementById('sessions-drawer');
  drawer.classList.toggle('open');
  if (drawer.classList.contains('open')) store.loadSessions();
};

document.getElementById('btn-new-session').onclick = () => store.newSession();

document.getElementById('btn-commit').onclick = () => {
  if (confirm('Commit this session? (ends the session, changes stay as-is)')) {
    claudeFrame()?.contentWindow?.postMessage({ type: 'upend:end-session' }, '*');
    document.getElementById('btn-commit').style.display = 'none';
    document.getElementById('session-label').textContent = 'committed';
    store.currentSessionId = null;
    store.loadSessions();
  }
};

// listen for session state from chat iframe
window.addEventListener('message', (e) => {
  if (e.data?.type === 'upend:session-changed') {
    store.currentSessionId = e.data.sessionId;
    const label = document.getElementById('session-label');
    const commitBtn = document.getElementById('btn-commit');
    if (e.data.sessionId) {
      label.textContent = e.data.prompt ? e.data.prompt.slice(0, 40) : `session #${e.data.sessionId}`;
      commitBtn.style.display = (e.data.status === 'active') ? '' : 'none';
    } else {
      label.textContent = 'no session';
      commitBtn.style.display = 'none';
    }
    store.loadSessions();
  }

  if (e.data?.type === 'upend:status') {
    const dot = document.getElementById('topbar-dot');
    const text = document.getElementById('topbar-status-text');
    if (dot) dot.className = `dot ${e.data.state}`;
    if (text) text.textContent = e.data.text;
  }

  if (e.data?.type === 'upend:turn-complete') {
    const iframe = document.getElementById('right-iframe');
    if (iframe?.src) iframe.src = iframe.src;
    loadApps();
  }
});

// ---------- resizer ----------

const resizer = document.getElementById('resizer');
let isResizing = false;

resizer.addEventListener('mousedown', () => {
  isResizing = true;
  document.body.style.cursor = 'col-resize';
  document.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = 'none');
});

document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const rect = document.getElementById('panels').getBoundingClientRect();
  const pct = Math.max(20, Math.min(80, ((e.clientX - rect.left) / rect.width) * 100));
  document.getElementById('panel-left').style.flex = `0 0 ${pct}%`;
  document.getElementById('panel-right').style.flex = `0 0 ${100 - pct}%`;
});

document.addEventListener('mouseup', () => {
  if (!isResizing) return;
  isResizing = false;
  document.body.style.cursor = '';
  document.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = '');
});

// ---------- init ----------

checkAuth();
</script>
</body>
</html>
